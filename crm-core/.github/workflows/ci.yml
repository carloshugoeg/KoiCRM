name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]
jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-core
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: crm-core/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm lint
      - run: pnpm test
